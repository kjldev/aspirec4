name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: CSharpier format check
        run: |
          dotnet tool install --global csharpier --version 1.2.6
          csharpier check src

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      CONFIGURATION: Release
      SOLUTION: ./src/AspireC4.slnx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run unit tests
        run: dotnet test --project src/tests/AspireC4.UnitTests --no-build --verbosity normal --configuration ${{ env.CONFIGURATION }}

  build-integration-test-image:
    name: Build Integration Test Image (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: docker
            dockerfile: tests/Docker/Dockerfile.e2e
            image: aspirec4-e2e-docker
          - runtime: podman
            dockerfile: tests/Docker/Dockerfile.e2e-podman
            image: aspirec4-e2e-podman

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build test runner image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${{ matrix.image }} \
            .

      - name: Save image
        run: docker save ${{ matrix.image }} | gzip > /tmp/${{ matrix.image }}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image }}
          path: /tmp/${{ matrix.image }}.tar.gz
          retention-days: 1

  build-and-integration-test:
    name: Build and Integration Test (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    needs: build-integration-test-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: docker
            image: aspirec4-e2e-docker
            docker_flags: --privileged
          - runtime: podman
            image: aspirec4-e2e-podman
            docker_flags: --privileged

    env:
      CONFIGURATION: Release
      SOLUTION: ./src/AspireC4.slnx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download test runner image
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.image }}
          path: /tmp

      - name: Load test runner image
        run: docker load < /tmp/${{ matrix.image }}.tar.gz

      - name: Set up .NET (for restore/build on host)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run integration tests inside ${{ matrix.runtime }} container
        run: |
          docker run --rm \
            ${{ matrix.docker_flags }} \
            -v $(pwd):/workspace \
            -v /home/runner/.nuget/packages:/home/runner/.nuget/packages:ro \
            -w /workspace \
            -e CONFIGURATION=${{ env.CONFIGURATION }} \
            ${{ matrix.image }} \
            dotnet test \
              --project src/tests/AspireC4.IntegrationTests \
              --no-build \
              --verbosity normal \
              --configuration ${{ env.CONFIGURATION }}

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - format-check
      - build-and-test
      - build-and-integration-test

    steps:
      - name: Verify upstream jobs succeeded
        env:
          FORMAT_CHECK_RESULT: ${{ needs['format-check'].result }}
          BUILD_AND_TEST_RESULT: ${{ needs['build-and-test'].result }}
          BUILD_AND_INTEGRATION_TEST_RESULT: ${{ needs['build-and-integration-test'].result }}
        shell: bash
        run: |
          set -euo pipefail

          declare -A results=(
            ["Format Check"]="${FORMAT_CHECK_RESULT}"
            ["Build and Test"]="${BUILD_AND_TEST_RESULT}"
            ["Build and Integration Test"]="${BUILD_AND_INTEGRATION_TEST_RESULT}"
          )

          failures=0

          for job_name in "${!results[@]}"; do
            result="${results[$job_name]}"

            if [[ "${result}" != "success" ]]; then
              echo "::error::${job_name} finished with result '${result}'."
              failures=1
            fi
          done

          if [[ "${failures}" -ne 0 ]]; then
            exit 1
          fi

