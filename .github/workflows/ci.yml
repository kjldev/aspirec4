name: CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: CSharpier format check
        run: |
          dotnet tool install --global csharpier --version 1.2.6
          csharpier check src

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      CONFIGURATION: Release
      SOLUTION: ./src/AspireC4.slnx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run unit tests
        run: dotnet test --project src/tests/AspireC4.UnitTests --no-build --verbosity normal --configuration ${{ env.CONFIGURATION }}

  build-and-integration-test:
    name: Build and Integration Test
    runs-on: ubuntu-latest

    env:
      CONFIGURATION: Release
      SOLUTION: ./src/AspireC4.slnx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run integration tests
        run: dotnet test --project src/tests/AspireC4.IntegrationTests --no-build --verbosity normal --configuration ${{ env.CONFIGURATION }}

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - format-check
      - build-and-test
      - build-and-integration-test

    steps:
      - name: Verify upstream jobs succeeded
        env:
          FORMAT_CHECK_RESULT: ${{ needs['format-check'].result }}
          BUILD_AND_TEST_RESULT: ${{ needs['build-and-test'].result }}
          BUILD_AND_INTEGRATION_TEST_RESULT: ${{ needs['build-and-integration-test'].result }}
        shell: bash
        run: |
          set -euo pipefail

          declare -A results=(
            ["Format Check"]="${FORMAT_CHECK_RESULT}"
            ["Build and Test"]="${BUILD_AND_TEST_RESULT}"
            ["Build and Integration Test"]="${BUILD_AND_INTEGRATION_TEST_RESULT}"
          )

          failures=0

          for job_name in "${!results[@]}"; do
            result="${results[$job_name]}"

            if [[ "${result}" != "success" ]]; then
              echo "::error::${job_name} finished with result '${result}'."
              failures=1
            fi
          done

          if [[ "${failures}" -ne 0 ]]; then
            exit 1
          fi
