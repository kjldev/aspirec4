name: Cleanup Old Artifacts

permissions:
  actions: write

on:
  schedule:
    - cron: '0 2 * * 0' # Weekly on Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Delete artifacts older than this many days'
        required: false
        default: '7'

jobs:
  cleanup:
    name: Delete artifacts older than ${{ inputs.retention_days || 7 }} days
    runs-on: ubuntu-latest

    steps:
      - name: Delete old artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RETENTION_DAYS: ${{ inputs.retention_days || 7 }}
        run: |
          set -euo pipefail

          cutoff="$(date -u -d "${RETENTION_DAYS} days ago" '+%Y-%m-%dT%H:%M:%SZ')"
          echo "Deleting artifacts created before ${cutoff} (older than ${RETENTION_DAYS} days)"

          deleted=0

          while IFS= read -r artifact_id; do
            [[ -z "${artifact_id}" ]] && continue
            echo "  Deleting artifact ${artifact_id}"
            if gh api -X DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}"; then
              (( deleted++ )) || true
            else
              echo "::warning::Failed to delete artifact ${artifact_id} — it may have already been removed."
            fi
          done < <(
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts" \
              --paginate \
              --jq ".artifacts[] | select(.created_at < \"${cutoff}\") | .id"
          )

          echo "Deleted ${deleted} artifact(s)."
